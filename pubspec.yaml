name: obtainium
description: Get Android app updates straight from the source.
publish_to: 'none'

version: 1.6.10+2349

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  path_provider: ^2.1.6
  flutter_fgbg: ^0.8.0
  flutter_local_notifications: ^22.0.1
  provider: ^6.1.5+1
  http: ^1.6.0
  webview_flutter: ^4.14.1
  dynamic_system_colors: ^1.9.0
  html: ^0.15.6
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  permission_handler: ^12.0.3
  fluttertoast: ^9.1.0
  device_info_plus: ^13.2.0
  file_picker: ^12.0.0-beta.7
  animations: ^2.2.0
  android_package_installer: # TODO: Upstream PR pending; if not accepted, keep fork maintained
    git:
      url: https://github.com/ImranR98/android_package_installer
      ref: c0a7e4759b20a0c2cd1b4d40a41ff395e5f3d0e4
  android_package_manager: # TODO: Submit PR to upstream and switch back when merged
    git:
      url: https://github.com/ImranR98/android_package_manager
      ref: 98661a5824c94ae990ae0f7bf0bdb1478300c4f7
  share_plus: ^13.2.0
  sqflite: ^2.4.3
  easy_localization: ^3.0.8
  intl: ^0.20.2
  android_intent_plus: ^6.0.0
  flutter_archive: ^6.3.1
  archive: ^4.0.9
  hsluv: ^1.1.3
  connectivity_plus: ^7.2.0
  shared_storage: # TODO: Upstream maintenance uncertain; consider alternatives or fork to org
    git:
      url: https://github.com/AlexBacich/shared-storage
      ref: 6dbcdf2c2045e326f59c062f542724aedf73cb6e
  crypto: ^3.0.7
  bcrypt: ^1.2.0
  app_links: ^7.2.1
  equations: ^6.0.0
  flex_color_picker: ^3.8.0
  android_system_font: # TODO: Forked dependency; watch upstream for releases
    git:
      url: https://github.com/re7gog/android_system_font
      ref: 077e15d7d0acb82283b89dfd82f4984b27b28f95
  shizuku_apk_installer: # TODO: Forked dependency; watch upstream for releases
    git:
      url: https://github.com/re7gog/shizuku_apk_installer
      ref: 3ef7f8fbf904848d144304556b0f80c91fee82a5
  markdown: ^7.3.1
  flutter_typeahead: ^6.0.0
  battery_plus: ^7.1.0
  flutter_charset_detector: ^6.0.0
  flutter_markdown_plus: ^1.0.12
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/graphics/icon.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/graphics/

  fonts:
      - family: Montserrat
        fonts:
          - asset: assets/fonts/Montserrat-Regular.ttf
