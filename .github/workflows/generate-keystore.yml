name: Generate Signing Keystore

on:
  workflow_dispatch:
    inputs:
      store_password:
        description: 'Keystore password'
        required: true
        type: string
      key_password:
        description: 'Key password'
        required: true
        type: string
      key_alias:
        description: 'Key alias'
        required: false
        default: 'obtainx'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore obtainx.jks \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -alias "${{ inputs.key_alias }}" \
            -storepass "${{ inputs.store_password }}" \
            -keypass "${{ inputs.key_password }}" \
            -dname "CN=ObtainX, O=ObtainX, L=Unknown, ST=Unknown, C=US"

      - name: Base64 encode keystore
        run: |
          base64 -w 0 obtainx.jks > obtainx_base64.txt
          echo ""
          echo "======================================================"
          echo "  KEYSTORE GENERATED SUCCESSFULLY"
          echo "======================================================"
          echo ""
          echo "Download the artifact below, then create these"
          echo "repository secrets (Settings > Secrets > Actions):"
          echo ""
          echo "  KEYSTORE_BASE64    = contents of obtainx_base64.txt"
          echo "  KEYSTORE_PASSWORD  = ${{ inputs.store_password }}"
          echo "  KEY_PASSWORD       = ${{ inputs.key_password }}"
          echo "  KEY_ALIAS          = ${{ inputs.key_alias }}"
          echo ""
          echo "Then DELETE this workflow file - it is one-time use."
          echo "======================================================"

      - name: Upload keystore files
        uses: actions/upload-artifact@v4
        with:
          name: obtainx-keystore
          path: |
            obtainx.jks
            obtainx_base64.txt
          retention-days: 1
